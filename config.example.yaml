interval: 300s
log_level: debug

prefetch:
  # While S01 is playing, search S02. Set to 2 to search S02 and S03.
  seasons_ahead: 1
  # Start prefetching only once this percentage of the current season is reached.
  # Set to 0 to prefetch from the first episode.
  min_season_progress_percent: 0
  include_current_season: false
  search_complete_seasons: false
  # Sonarr tag labels that should skip prefetching for matching series.
  excluded_sonarr_tags: []

jellyfin:
  url: http://jellyfin:8096
  api_key: your-jellyfin-api-key

sonarr:
  url: http://sonarr:8989
  api_key: your-sonarr-api-key

# Empty means all users.
allowed_users: []
